<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shniro Notes — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2979FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>

<body class="auth-body">

    <!-- Background gradient -->
    <div class="auth-bg"></div>

    <!-- Auth Card -->
    <div class="auth-container">
        <div class="auth-card" id="loginCard">
            <!-- Header -->
            <div class="auth-top">
                <h1 class="brand-title">
                    <img src="icon.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; vertical-align: middle; margin-right: 8px;">
                    Shniro <span class="blue">Notes</span>
                </h1>
                <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                    <svg id="themeIcon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                </button>
            </div>

            <!-- Badge -->
            <div class="auth-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                    <path d="M6 12v5c0 2 6 3 6 3s6-1 6-3v-5" />
                </svg>
                EXCLUSIVELY FOR PARUL UNIVERSITY STUDENTS
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="field">
                    <label for="loginRollNo">Student ID / Roll Number</label>
                    <div class="input-box">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="2" y="5" width="20" height="14" rx="2" />
                            <line x1="2" y1="10" x2="22" y2="10" />
                        </svg>
                        <input type="text" id="loginRollNo" placeholder="e.g. XX" required>
                    </div>
                </div>
                <div class="field">
                    <label for="loginEnrollNo">Academic Enrollment Number</label>
                    <div class="input-box">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                        </svg>
                        <input type="text" id="loginEnrollNo" placeholder="e.g. 2503051050XXX" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <span>Explore Portal</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </button>
            </form>

            <p class="auth-note">Secure passwordless entry for Parul University</p>

            <div class="auth-divider"><span>New student?</span></div>

            <button class="btn btn-ghost" onclick="showCard('registerCard')">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="8.5" cy="7" r="4" />
                    <line x1="20" y1="8" x2="20" y2="14" />
                    <line x1="23" y1="11" x2="17" y2="11" />
                </svg>
                Request Registration
            </button>
        </div>

        <!-- Register Card -->
        <div class="auth-card" id="registerCard" style="display:none;">
            <div class="auth-top">
                <h1 class="brand-title">Register <span class="blue">Here</span></h1>
                <button class="theme-toggle" onclick="showCard('loginCard')" title="Back">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12" />
                        <polyline points="12 19 5 12 12 5" />
                    </svg>
                </button>
            </div>

            <div class="auth-badge blue-badge">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                </svg>
                YOUR REQUEST WILL BE SENT TO ADMIN FOR APPROVAL
            </div>

            <form id="registerForm">
                <div class="field">
                    <label for="regName">Full Name</label>
                    <div class="input-box">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input type="text" id="regName" placeholder="Your full name" required>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="regRollNo">Roll Number</label>
                        <div class="input-box">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="5" width="20" height="14" rx="2" />
                                <line x1="2" y1="10" x2="22" y2="10" />
                            </svg>
                            <input type="text" id="regRollNo" placeholder="Roll No." required>
                        </div>
                    </div>
                    <div class="field">
                        <label for="regEnrollNo">Enrollment No.</label>
                        <div class="input-box">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                            <input type="text" id="regEnrollNo" placeholder="Enrollment No." required>
                        </div>
                    </div>
                </div>
                <div class="field-row">
                    <div class="field">
                        <label for="regBranch">Branch</label>
                        <div class="input-box">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
                                <path d="M6 12v5c0 2 6 3 6 3s6-1 6-3v-5" />
                            </svg>
                            <select id="regBranch" required>
                                <option value="" disabled selected>Select</option>
                                <option value="CSE">CSE</option>
                                <option value="ECE">ECE</option>
                                <option value="ME">ME</option>
                                <option value="CE">CE</option>
                                <option value="EE">EE</option>
                                <option value="IT">IT</option>
                                <option value="OTHER">Other</option>
                            </select>
                        </div>
                    </div>
                    <div class="field">
                        <label for="regSemester">Semester</label>
                        <div class="input-box">
                            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                <line x1="16" y1="2" x2="16" y2="6" />
                                <line x1="8" y1="2" x2="8" y2="6" />
                                <line x1="3" y1="10" x2="21" y2="10" />
                            </svg>
                            <select id="regSemester" required>
                                <option value="" disabled selected>Sem</option>
                                <option value="1">1st</option>
                                <option value="2">2nd</option>
                                <option value="3">3rd</option>
                                <option value="4">4th</option>
                                <option value="5">5th</option>
                                <option value="6">6th</option>
                                <option value="7">7th</option>
                                <option value="8">8th</option>
                            </select>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="registerBtn">
                    <span>Send Request</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </form>

            <p class="auth-note">You'll be able to login after admin approval</p>
        </div>
    </div>

    <!-- Toast -->
    <div id="toastBox" class="toast-box"></div>

    <!-- Popup -->
    <div id="popup" class="popup-overlay" style="display:none;">
        <div class="popup-card">
            <div class="popup-icon-wrap" id="popupIconWrap">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
            </div>
            <h2 id="popupTitle">Done!</h2>
            <p id="popupMsg">Message here</p>
            <button class="btn btn-primary" onclick="closePopup()">Got it</button>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
