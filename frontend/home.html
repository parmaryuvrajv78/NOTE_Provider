<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shniro Notes — Study Materials</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2979FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <!-- App Shell -->
    <header class="app-header">
        <nav class="navbar">
            <div class="nav-brand">
                <img src="icon.png" alt="Logo" style="width: 28px; height: 28px; border-radius: 6px; margin-right: 10px;">
                Shniro <span class="blue">Notes</span>
            </div>
            <div class="nav-brand-mobile" style="display: none;">
                <img src="icon.png" alt="Logo" style="width: 24px; height: 24px; border-radius: 6px; margin-right: 8px;">
                Shniro <span class="blue">Notes</span>
            </div>
            <div class="nav-right">
                <div class="nav-user">
                    <div class="avatar-circle" id="userAvatar">S</div>
                    <span id="userName">Student</span>
                </div>
                <button class="btn-logout" id="logoutBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    <span>Logout</span>
                </button>
            </div>
            <!-- Mobile Right Icon -->
            <div class="nav-right-mobile" style="display: none;">
                <button class="theme-toggle" id="mobileThemeToggle" style="border:none; background:transparent;">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </nav>
    </header>

    <main class="main-content">
        <!-- Welcome -->
        <section class="welcome-section">
            <div class="welcome-card">
                <div class="premium-badge">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    PREMIUM
                </div>
                <h2 id="welcomeMsg">Welcome! 👋</h2>
                <p class="section-desc">Browse and download study materials for your semester</p>
            </div>
        </section>

        <!-- Search & Discovery -->
        <section class="discovery-section">
            <div class="search-bar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search subjects, topics...">
            </div>
        </section>

        <!-- Dynamic Content Area -->
        <section class="materials-section">
            <div id="materialsContainer"></div>
            
            <!-- No results -->
            <div id="noResults" class="empty-state" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <h3>Nothing found</h3>
                <p>Try a different search term or filter</p>
            </div>
        </section>
    </main>

    <!-- Material Modal -->
    <div id="matModal" class="popup-overlay" style="display:none;">
        <div class="mat-modal-card">
            <button class="mat-modal-close" onclick="closeMatModal()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div class="mat-modal-head">
                <div class="mat-icon-box" style="width:48px;height:48px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                </div>
                <div>
                    <h2 id="modalTitle">Title</h2>
                    <span class="mat-subject" id="modalSubject">Subject</span>
                </div>
            </div>
            <div class="mat-modal-body">
                <p id="modalDesc">Description</p>
                <div class="mat-tags" id="modalTags"></div>
            </div>
            <div class="mat-modal-btns">
                <button class="btn btn-secondary" id="modalView" style="background: var(--blue-light); color: var(--blue);">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    View
                </button>
                <button class="btn btn-primary" id="modalDownload">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>
                <button class="btn btn-ghost" onclick="closeMatModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="toastBox" class="toast-box"></div>

    <!-- Bottom Navigation (Android Style) -->
    <nav class="bottom-nav">
        <a href="javascript:void(0)" class="nav-item active" onclick="switchView('all', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            <span>Home</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="switchView('search', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <span>Search</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" onclick="switchView('saved', this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            <span>Saved</span>
        </a>
        <a href="javascript:void(0)" class="nav-item" id="mobileLogout">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span>Exit</span>
        </a>
    </nav>

    <!-- Floating Action Button -->
    <button class="fab" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" title="Back to top">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="18 15 12 9 6 15"/></svg>
    </button>

    <script src="js/data.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
